<div class="layout-grid">

  <!-- Spacer Column -->
  <div class="spacer"></div>

  <!-- Header -->
  <div class="report-header d-flex align-center justify-between">
    <div routerLink="/dashboard" class="logo d-flex align-center">
      <a href="/dashboard">
        <img src="../../../favicon.png" alt="logo" width="40px">
      </a>
    </div>

    @if (changesMade()) {
      <p>Unsaved changes made</p>
    }

    @if (schedulingOption()) {
      <div class="d-flex gap-5">
         <div>Frequency: {{ schedulingOption().jobData.frequency | titlecase }}</div>
         <div>Next sending<br>{{ schedulingOption().nextRun | date: 'MMM d, yyyy h:mm' }}</div>
      </div>
    }

    <div class="d-flex align-center justify-end">
      <button (click)="isPreviewMode.set(!isPreviewMode())" class="mr-3">Preview</button>
      <select
        class="mr-3"
        [ngModel]="selectedDatePreset()"
        (ngModelChange)="onDatePresetChange($event)"
      >
        @for (preset of reportsDataService.DATE_PRESETS; track preset.value) {
          <option [value]="preset.value">
            {{ preset.text }}
          </option>
        }
      </select>
      <button (click)="editScheduleConfiguration()">Scheduling configuration</button>
      <button class="blue ml-3" (click)="saveConfiguration()">Save</button>
    </div>
  </div>

  <!-- Main Report Content -->
  <div class="main-content">
    <main>
      @if (reportStatsLoading()) {
        <div class="loading text-center">Loading...</div>
      } @else {
        <report
          [reportSections]="reportSections()"
          [data]="mockData()"
          [mode]="'edit'"
        ></report>
      }
    </main>
  </div>

  <!-- Side Panel (Metrics) -->
  @if (!isPreviewMode()) {
    <div class="side-panel">
      <edit-metrics
        [reportSections]="reportSections()"
        [reportTitle]="reportTitle()"
        (reportSectionsChange)="reportSections.set($event)"
        (reportTitleChange)="reportTitle.set($event)"
      />
    </div>
  }

</div>
